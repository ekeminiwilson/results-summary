<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results Summary Component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <main class="card">
    <!-- Left Section: Results -->
    <section class="result-panel">
      <h1 class="panel-title text-light-blue">Your Result</h1>
      
      <div class="score-circle">
        <span class="score-number">76</span>
        <span class="score-total text-light-blue">of 100</span>
      </div>

      <div class="feedback-container">
        <p class="feedback-grade">Great</p>
        <p class="feedback-text text-light-blue">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>
    </section>

    <!-- Right Section: Summary -->
    <section class="summary-panel">
      <h2 class="panel-title text-dark-navy">Summary</h2>

      <div class="summary-list">
        <!-- Reaction -->
        <div class="summary-item item-reaction">
          <div class="item-label">
            <svg xmlns="http://w3.org" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#F55" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M10.833 1.667 4.167 10h5.833l-.833 8.333L15.833 10H10l.833-8.333Z"/></svg>
            <span>Reaction</span>
          </div>
          <div class="item-score">
            <span class="score-obtained">80</span> <span class="score-max">/ 100</span>
          </div>
        </div>

        <!-- Memory -->
        <div class="summary-item item-memory">
          <div class="item-label">
            <svg xmlns="http://w3.org" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#FFB21E" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M11.667 10.833H13.333m-5-3.333H10m-2.5 6.666h.008m.825-7.5a2.5 2.5 0 1 1 3.334 0c.915.65 1.5 1.691 1.5 2.833 0 1.25-.625 2.5-1.142 3.333-.283.456-.517.85-.517 1.25v.833A1.667 1.667 0 0 1 9.792 18.333H8.542A1.667 1.667 0 0 1 6.875 16.667v-.833c0-.4.234-.794.517-1.25C7.917 13.75 8.542 12.5 8.542 11.25c0-1.142.585-2.183 1.5-2.833Z"/></svg>
            <span>Memory</span>
          </div>
          <div class="item-score">
            <span class="score-obtained">92</span> <span class="score-max">/ 100</span>
          </div>
        </div>

        <!-- Verbal -->
        <div class="summary-item item-verbal">
          <div class="item-label">
            <svg xmlns="http://w3.org" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#00BB8F" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M16.667 5H3.333A1.667 1.667 0 0 0 1.667 6.667v8.333A1.667 1.667 0 0 0 3.333 16.667h13.334A1.667 1.667 0 0 0 18.333 15V6.667A1.667 1.667 0 0 0 16.667 5ZM6.667 9.167h5M6.667 11.667h6.666"/></svg>
            <span>Verbal</span>
          </div>
          <div class="item-score">
            <span class="score-obtained">61</span> <span class="score-max">/ 100</span>
          </div>
        </div>

        <!-- Visual -->
        <div class="summary-item item-visual">
          <div class="item-label">
            <svg xmlns="http://w3.org" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#1125D6" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M10 11.667a1.667 1.667 0 1 0 0-3.334 1.667 1.667 0 0 0 0 3.334Z"/><path stroke="#1125D6" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M17.5 10c-1.579 2.5-4.148 5-7.5 5s-5.921-2.5-7.5-5c1.579-2.5 4.148-5 7.5-5s5.921 2.5 7.5 5Z"/></svg>
            <span>Visual</span>
          </div>
          <div class="item-score">
            <span class="score-obtained">73</span> <span class="score-max">/ 100</span>
          </div>
        </div>
      </div>

      <button class="btn-continue">Continue</button>
    </section>
  </main>

</body>
</html>
